<!-- Бонус панел (замени стария в index.html с този) -->
<div class="bonus-box">
    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
        <span style="font-weight: bold;">📅 Ежедневен бонус</span>
        <span style="font-size: 11px; color: #888;">Ден 1 от 7</span>
    </div>
    
    <!-- Квадратчета за дните -->
    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
        <div style="flex:1; height:30px; background:#d4a017; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px;">Д1</div>
        <div style="flex:1; height:30px; background:#333; border-radius:4px;"></div>
        <div style="flex:1; height:30px; background:#333; border-radius:4px;"></div>
        <div style="flex:1; height:30px; background:#333; border-radius:4px;"></div>
        <div style="flex:1; height:30px; background:#333; border-radius:4px;"></div>
        <div style="flex:1; height:30px; background:#333; border-radius:4px;"></div>
        <div style="flex:1; height:30px; background:#333; border-radius:4px;"></div>
    </div>
    
    <div style="font-size: 11px; color: #ccc; margin-bottom: 8px;">Награда: 20 Енергия</div>
    <button class="bonus-btn" id="bonusBtn" onclick="claimBonus()">Вземи бонуса</button>
</div>

<script>
    function claimBonus() {
        const btn = document.getElementById('bonusBtn');
        // Проверка дали вече е взет за днес
        if(localStorage.getItem('bonusClaimed') === 'true') {
            alert("Бонусът вече е взет! Ела утре.");
            return;
        }
        
        // Логика за добавяне на енергия
        let energy = parseInt(localStorage.getItem('energy')) || 100;
        localStorage.setItem('energy', energy + 20);
        localStorage.setItem('bonusClaimed', 'true');
        
        btn.innerText = "ВЗЕТО";
        btn.style.backgroundColor = "#555";
        btn.disabled = true;
        alert("Успешно взе бонус 20 Енергия!");
    }
</script>
