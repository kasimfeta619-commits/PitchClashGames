<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Pitch Clash - Начало</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; }
        
        /* Панел с основни данни */
        .stats-panel { background: linear-gradient(135deg, #1e1e1e, #000); border: 1px solid #333; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .ovr-big { font-size: 48px; font-weight: bold; color: #007bff; }
        
        /* Следващ мач - Панел */
        .next-match-panel { background: #2a251a; border: 1px solid #d4a017; padding: 15px; border-radius: 12px; text-align: center; }
        
        /* Долна навигация */
        .nav-bar { display: flex; justify-content: space-around; background: #161616; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .nav-item { cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- Панел със състояние на играча -->
    <div class="stats-panel">
        <div style="font-size: 14px; color: #888;">Твоят рейтинг</div>
        <div class="ovr-big" id="displayOvr">42</div>
        <div style="display: flex; justify-content: space-around; margin-top: 15px;">
            <div>⚡ 100 Енергия</div>
            <div>🪙 500 Монети</div>
        </div>
    </div>

    <!-- Home панел за следващ мач -->
    <div class="next-match-panel">
        <div style="font-size: 12px; color: #d4a017; text-transform: uppercase;">Следващ мач</div>
        <div style="font-size: 18px; margin: 10px 0; font-weight: bold;">Лига: Кръг 2</div>
        <button onclick="location.href='match.html'" style="background: #d4a017; border: none; padding: 10px 30px; border-radius: 6px; font-weight: bold; cursor: pointer;">ИГРАЙ СЕГА</button>
    </div>

    <!-- Долна навигация -->
    <div class="nav-bar">
        <div class="nav-item" onclick="location.href='home.html'">🏠</div>
        <div class="nav-item" onclick="location.href='training.html'">🥇</div>
        <div class="nav-item" onclick="location.href='team.html'">👥</div>
        <div class="nav-item" onclick="location.href='profile.html'">👤</div>
    </div>
</div>

<script>
    // Зареждаме OVR от localStorage
    document.getElementById('displayOvr').innerText = localStorage.getItem('playerOvr') || 42;
</script>

</body>
</html>
