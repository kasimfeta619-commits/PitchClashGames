<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Pitch Clash - Мултиплейър отбори</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #0f1016; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; padding-bottom: 70px; }
        
        /* Топ хедър бар с ресурси */
        .top-bar { background: #1a1c24; border: 1px solid #2a2e3d; padding: 10px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 13px; }
        .res-item { display: flex; align-items: center; gap: 5px; font-weight: bold; }
        .shop-btn { background: #2a2e3d; border: 1px solid #3e445b; color: #fff; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .shop-btn:hover { background: #3e445b; }

        /* Заглавие и бутон Създай */
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { font-size: 18px; margin: 0; }
        .subtitle { font-size: 12px; color: #8a8f9d; margin-top: 2px; }
        
        .create-team-btn { background: #1b3a26; border: 1px solid #00e676; color: #00e676; padding: 6px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .create-team-btn:hover { background: #00e676; color: #000; }

        /* Статус блок - Не си в отбор или Вече си в отбор */
        .no-team-card { background: #1a1c24; border: 1px solid #2a2e3d; border-radius: 12px; padding: 25px 15px; text-align: center; margin-bottom: 20px; color: #8a8f9d; font-size: 13px; }
        .no-team-icon { font-size: 24px; margin-bottom: 8px; display: block; }
        .no-team-title { color: #fff; font-weight: bold; font-size: 14px; margin-bottom: 5px; }

        /* Секция Отворени отбори */
        .section-title { font-size: 11px; color: #8a8f9d; text-transform: uppercase; font-weight: bold; margin-bottom: 10px; letter-spacing: 0.5px; }
        
        .team-card { background: #1a1c24; border: 1px solid #2a2e3d; border-radius: 10px; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .team-info { display: flex; align-items: center; gap: 12px; }
        .team-shield { background: #121318; border: 1px solid #32384a; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .t-name { font-weight: bold; font-size: 14px; margin-bottom: 3px; }
        .t-details { font-size: 11px; color: #8a8f9d; }
        
        .join-btn { background: #1b3a26; border: 1px solid #00e676; color: #00e676; padding: 6px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .join-btn:hover { background: #00e676; color: #000; }
        
        .leave-btn { background: #3a1b1b; border: 1px solid #ff5252; color: #ff5252; padding: 6px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; margin-top: 10px; }
        .leave-btn:hover { background: #ff5252; color: #000; }

        /* Навигационен бар долу */
        .nav-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; display: flex; justify-content: space-around; background: #1a1c24; border-top: 1px solid #2a2e3d; padding: 10px; z-index: 100; }
        .nav-item { color: #8a8f9d; text-decoration: none; font-size: 11px; text-align: center; display: flex; flex-direction: column; gap: 3px; }
        .nav-item.active { color: #00e676; }
        .nav-item span { font-size: 16px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- ТОП БАР С ЕНЕРГИЯ И КЕШ -->
    <div class="top-bar">
        <div class="res-item" style="color: #ff9800;">⚡ <span id="topEnergy">100</span>/100</div>
        <div class="res-item" style="color: #d4a017;">🪙 <span id="topCash">500</span></div>
        <button class="shop-btn" onclick="location.href='shop.html'">Магазин</button>
    </div>

    <!-- ЗАГЛАВИЕ И БУТОН ЗА СЪЗДАВАНЕ -->
    <div class="header-section">
        <div>
            <h2>Отбор</h2>
            <div class="subtitle">Мултиплейър отбори</div>
        </div>
        <button class="create-team-btn" onclick="createTeamModal()">+ Създай</button>
    </div>

    <!-- СТАТУС БЛОК (Динамичен спрямо това дали играчът е в отбор) -->
    <div id="teamStatusContainer">
        <div class="no-team-card">
            <span class="no-team-icon">👥</span>
            <div class="no-team-title">Не си в отбор</div>
            <div>Създай свой или се присъедини към съществуващ</div>
        </div>
    </div>

    <!-- СПИСЪК С ОТВОРЕНИ ОТБОРИ -->
    <div class="section-title">Отворени отбори</div>
    
    <div id="teamsList">
        <div class="team-card">
            <div class="team-info">
                <div class="team-shield">🛡️</div>
                <div>
                    <div class="t-name">BulTeam1</div>
                    <div class="t-details">Капитан: arch5235 • 5 играча</div>
                </div>
            </div>
            <button class="join-btn" onclick="joinTeam('BulTeam1')">Влез</button>
        </div>
    </div>

    <!-- ДОЛЕН НАВИГАЦИОНЕН БАР -->
    <div class="nav-bar">
        <a href="matches.html" class="nav-item"><span>⚽</span> Мачове</a>
        <a href="training.html" class="nav-item"><span>🏋️</span> Трен.</a>
        <a href="index.html" class="nav-item"><span>🏠</span> Хъб</a>
        <a href="team.html" class="nav-item active"><span>👥</span> Отбор</a>
        <a href="profile.html" class="nav-item"><span>👤</span> Профил</a>
    </div>

</div>

<script>
    // Зареждане на ресурси и статус на отбора
    let energy = parseInt(localStorage.getItem('energy')) || 100;
    let cash = parseInt(localStorage.getItem('cash')) || 500;
    let myTeam = localStorage.getItem('myTeam');

    document.getElementById('topEnergy').innerText = energy;
    document.getElementById('topCash').innerText = cash;

    // Проверка дали играчът вече е в отбор, за да променим изгледа
    if (myTeam) {
        document.getElementById('teamStatusContainer').innerHTML = `
            <div class="no-team-card" style="border-color: #00e676;">
                <span class="no-team-icon">🛡️</span>
                <div class="no-team-title" style="color: #00e676;">${myTeam}</div>
                <div>Ти си член на този отбор.</div>
                <button class="leave-btn" onclick="leaveTeam()">Напусни отбора</button>
            </div>
        `;
    }

    function joinTeam(teamName) {
        localStorage.setItem('myTeam', teamName);
        alert(`Успешно се присъедини към отбор ${teamName}!`);
        location.reload();
    }

    function createTeamModal() {
        let name = prompt("Въведи име на новия отбор:");
        if (name) {
            localStorage.setItem('myTeam', name);
            alert(`Отбор "${name}" бе създаден успешно! Ти си капитан.`);
            location.reload();
        }
    }

    function leaveTeam() {
        if (confirm("Сигурен ли си, че искаш да напуснеш отбора?")) {
            localStorage.removeItem('myTeam');
            alert("Ти напусна отбора.");
            location.reload();
        }
    }
</script>

</body>
</html>
