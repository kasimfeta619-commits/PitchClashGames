<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Team HTPL - Профил</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #0f1016; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; padding-bottom: 70px; }
        
        /* Топ хедър бар с ресурси */
        .top-bar { background: #1a1c24; border: 1px solid #2a2e3d; padding: 10px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 13px; }
        .res-item { display: flex; align-items: center; gap: 5px; font-weight: bold; }

        /* Профилна главна карта */
        .profile-main-card { background: #1a1c24; border: 1px solid #2a2e3d; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 15px; }
        .avatar-circle { width: 64px; height: 64px; background: #2a2e3d; border-radius: 50%; margin: 0 auto 10px auto; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2px solid #00e676; }
        .profile-name { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
        .profile-role { font-size: 12px; color: #00e676; font-weight: bold; margin-bottom: 15px; }

        /* Статистика мрежа */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #121318; border: 1px solid #2a2e3d; padding: 12px; border-radius: 10px; text-align: center; }
        .stat-val { font-size: 16px; font-weight: bold; color: #d4a017; margin-top: 4px; }
        .stat-lbl { font-size: 11px; color: #8a8f9d; }

        /* Стадион и Ниво */
        .info-card { background: #1a1c24; border: 1px solid #2a2e3d; border-radius: 12px; padding: 15px; margin-bottom: 15px; font-size: 13px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2e3d; }
        .info-row:last-child { border-bottom: none; }

        /* Бутон за изход / нулиране */
        .danger-btn { width: 100%; background: #261212; color: #ff5252; border: 1px solid #ff5252; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .danger-btn:hover { background: #ff5252; color: #000; }

        /* Долен навигационен бар */
        .nav-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; display: flex; justify-content: space-around; background: #1a1c24; border-top: 1px solid #2a2e3d; padding: 10px; z-index: 100; }
        .nav-item { color: #8a8f9d; text-decoration: none; font-size: 11px; text-align: center; display: flex; flex-direction: column; gap: 3px; }
        .nav-item.active { color: #00e676; }
        .nav-item span { font-size: 16px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- ТОП БАР С РЕСУРСИ -->
    <div class="top-bar">
        <div class="res-item" style="color: #ff9800;">⚡ <span id="topEnergy">100</span></div>
        <div class="res-item" style="color: #00bcd4;">💎 <span id="topDiamonds">10</span></div>
        <div class="res-item" style="color: #d4a017;">🪙 <span id="topCash">500</span></div>
    </div>

    <!-- ПРОФИЛНА ГЛАВНА КАРТА -->
    <div class="profile-main-card">
        <div class="avatar-circle">⚽</div>
        <div class="profile-name" id="profName">kasim112233</div>
        <div class="profile-role">Капитан • Отбор <span id="profTeam">BulTeam1</span></div>
    </div>

    <!-- СТАТИСТИКА -->
    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-lbl">Общ OVR</div>
            <div class="stat-val" id="profOvr">42</div>
        </div>
        <div class="stat-box">
            <div class="stat-lbl">Натрупан XP</div>
            <div class="stat-val" id="profXp">120</div>
        </div>
        <div class="stat-box">
            <div class="stat-lbl">MVP Награди</div>
            <div class="stat-val">3</div>
        </div>
        <div class="stat-box">
            <div class="stat-lbl">Ниво Прогресия</div>
            <div class="stat-val" style="color: #00e676;">Ниво 1</div>
        </div>
    </div>

    <!-- ИНФО ЗА СТАДИОН И ПРОГРЕС -->
    <div class="info-card">
        <div class="info-row">
            <span style="color: #8a8f9d;">Капацитет стадион:</span>
            <b>150 фенове</b>
        </div>
        <div class="info-row">
            <span style="color: #8a8f9d;">Статус в мачовете:</span>
            <b style="color: #00e676;">Активен играч</b>
        </div>
        <div class="info-row">
            <span style="color: #8a8f9d;">Спортна база:</span>
            <b>Ниво 1</b>
        </div>
    </div>

    <!-- БУТОН ЗА ИЗХОД -->
    <button class="danger-btn" onclick="resetData()">Изчисти паметта / Нов профил</button>

    <!-- ДОЛЕН НАВИГАЦИОНЕН БАР -->
    <div class="nav-bar">
        <a href="matches.html" class="nav-item"><span>⚽</span> Мачове</a>
        <a href="training.html" class="nav-item"><span>🏋️</span> Трен.</a>
        <a href="index.html" class="nav-item"><span>🏠</span> Хъб</a>
        <a href="team.html" class="nav-item"><span>👥</span> Отбор</a>
        <a href="profile.html" class="nav-item active"><span>👤</span> Профил</a>
    </div>

</div>

<script>
    // Зареждане на данни от localStorage
    let energy = parseInt(localStorage.getItem('energy')) || 100;
    let diamonds = parseInt(localStorage.getItem('diamonds')) || 10;
    let cash = parseInt(localStorage.getItem('cash')) || 500;
    let ovr = parseInt(localStorage.getItem('playerOvr')) || 42;
    let xp = parseInt(localStorage.getItem('playerXp')) || 120;
    let teamName = localStorage.getItem('playerTeam') || "BulTeam1";

    document.getElementById('topEnergy').innerText = energy;
    document.getElementById('topDiamonds').innerText = diamonds;
    document.getElementById('topCash').innerText = cash;
    document.getElementById('profOvr').innerText = ovr;
    document.getElementById('profXp').innerText = xp;
    document.getElementById('profTeam').innerText = teamName;

    function resetData() {
        if (confirm("Сигурен ли си, че искаш да рестартираш данните на играча?")) {
            localStorage.clear();
            alert("Данните бяха изчистени. Страницата ще се презареди.");
            location.reload();
        }
    }
</script>

</body>
</html>
