<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Football Career - Създай играч</title>
    <style>
        /* Основни стилове за тъмен фон */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Главният контейнер в центъра */
        .main-container {
            text-align: center;
            width: 360px; /* Ширина като на мобилно приложение */
            padding: 20px;
        }

        /* Иконата на топката */
        .app-icon {
            width: 64px;
            height: 64px;
            background-color: #00e676; /* Ярко зелено */
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .app-icon svg {
            width: 40px;
            height: 40px;
            fill: #121212;
        }

        /* Заглавия */
        h1 {
            color: #00e676;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        p {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Поле за име */
        .input-field {
            width: 100%;
            padding: 12px;
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 30px;
            text-align: center;
        }
        .input-field:focus {
            outline: none;
            border-color: #00e676;
        }

        /* Позиции (Grid) */
        .positions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }
        .pos-btn {
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #a0a0a0;
            padding: 10px 5px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pos-btn.active {
            background-color: #00e676;
            color: #121212;
            border-color: #00e676;
            font-weight: 600;
        }
        .pos-btn:hover:not(.active) {
            border-color: #555;
        }

        /* Бутон "Следваща стъпка" */
        .next-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #00e676, #00c853); /* Градиент за дълбочина */
            color: #121212;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .next-btn:active {
            transform: scale(0.98); /* Ефект при натискане */
        }

        /* Долен навигационен бар (стилизиран) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #1e1e1e;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 10px;
            color: #a0a0a0;
        }
        .nav-item {
            text-align: center;
        }
        .nav-item.active {
            color: #00e676;
        }
        .nav-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Икона на футболна топка (SVG) -->
        <div class="app-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm2.59 14.81l-3.49-1.16-3.5 1.16c-.33.11-.69-.18-.61-.53l1.16-3.49-1.16-3.5c-.08-.35.26-.64.61-.53l3.49 1.16 3.5-1.16c.35-.12.69.18.61.53l-1.16 3.49 1.16 3.5c.08.35-.26.64-.61.53zM12 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 8c0 .55-.45 1-1 1s-1-.45-1-1 .45-1 1-1 1 .45 1 1zM5 12c0 .55-.45 1-1 1s-1-.45-1-1 .45-1 1-1 1 .45 1 1zm13.31 3.16l-1.49-.49.5-1.49c.12-.35-.18-.69-.53-.61l-3.49 1.16-3.5-1.16c-.35-.08-.64.26-.53.61l.5 1.49-1.49.49c-.35.08-.64.42-.53.77l1.16 3.49c.08.35.42.64.77.53l3.49-1.16 3.49 1.16c.35.12.69-.18.77-.53l1.16-3.49c.12-.35-.18-.69-.53-.61z"/></svg>
        </div>

        <h1>Football Career</h1>
        <p>Създай своя играч и избери клуб</p>

        <!-- Поле за име -->
        <input type="text" class="input-field" placeholder="Въведете име" value="kasim112233">

        <!-- Грид с позиции -->
        <div class="positions-grid">
            <button class="pos-btn">GK</button>
            <button class="pos-btn">CB</button>
            <button class="pos-btn">LB</button>
            <button class="pos-btn">RB</button>
            <button class="pos-btn">CDM</button>
            <button class="pos-btn">CM</button>
            <button class="pos-btn">CAM</button>
            <button class="pos-btn">LW</button>
            <button class="pos-btn">RW</button>
            <button class="pos-btn.active">ST</button>
            <button class="pos-btn">CF</button>
            <span></span> <!-- Празно място за баланс на грида -->
        </div>

        <!-- Бутон Следваща стъпка -->
        <button class="next-btn">Следваща стъпка →</button>
    </div>

    <!-- Долен навигационен бар -->
    <nav class="bottom-nav">
        <div class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 6h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM6 6h2c.55 0 1-.45 1-1s-.45-1-1-1H6c-.55 0-1 .45-1 1s.45 1 1 1zM12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zm3 15.5h-6v-1.25c0-.41.22-.78.58-.97C9.76 14.72 10.86 14 12 14s2.24.72 2.42 1.76c.36.19.58.56.58.97v1.25z"/></svg>
            <br>Мачове
        </div>
        <div class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19.5 9c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm-13 0c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zm3 15.5h-6v-1.25c0-.41.22-.78.58-.97C9.76 14.72 10.86 14 12 14s2.24.72 2.42 1.76c.36.19.58.56.58.97v1.25z"/></svg>
            <br>Трен.
        </div>
        <div class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2L4.5 8.5v10.5c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-5h4v5c0 .55.45 1 1 1h4c.55 0 1-.45 1-1V8.5L12 2z"/></svg>
            <br>Начало
        </div>
        <div class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.04-.97.05.89.7 1.47 1.62 1.47 2.95V19c0 .55.45 1 1 1h3c.55 0 1-.45 1-1v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <br>Отбор
        </div>
        <div class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <br>Профил
        </div>
    </nav>

</body>
</html>
