<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Football Career</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .main-container { text-align: center; width: 360px; padding: 20px; }
        .app-icon {
            width: 64px; height: 64px; background-color: #00e676;
            border-radius: 16px; display: flex; justify-content: center;
            align-items: center; margin: 0 auto 20px auto;
        }
        h1 { color: #00e676; margin-bottom: 10px; }
        .input-field {
            width: 100%; padding: 12px; background-color: #1e1e1e;
            border: 1px solid #333; border-radius: 8px; color: #fff;
            margin-bottom: 30px; text-align: center; box-sizing: border-box;
        }
        .positions-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; margin-bottom: 30px;
        }
        .pos-btn {
            background-color: #1e1e1e; border: 1px solid #333;
            color: #a0a0a0; padding: 10px 5px; border-radius: 6px;
            cursor: pointer; transition: all 0.2s;
        }
        /* Ето тук се случва магията за избор */
        .pos-btn.active {
            background-color: #fff;
            color: #000;
            border-color: #fff;
            font-weight: bold;
        }
        .next-btn {
            width: 100%; padding: 14px; background: #00e676;
            color: #121212; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer;
        }
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background-color: #1e1e1e; border-top: 1px solid #333;
            display: flex; justify-content: space-around; align-items: center;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="app-icon">⚽</div>
        <h1>Football Career</h1>
        <p>Създай своя играч и избери клуб</p>
        <input type="text" class="input-field" value="kasim112233">

        <div class="positions-grid" id="posGrid">
            <button class="pos-btn">GK</button>
            <button class="pos-btn">CB</button>
            <button class="pos-btn">LB</button>
            <button class="pos-btn">RB</button>
            <button class="pos-btn">CDM</button>
            <button class="pos-btn">CM</button>
            <button class="pos-btn">CAM</button>
            <button class="pos-btn">LW</button>
            <button class="pos-btn">RW</button>
            <button class="pos-btn">ST</button>
            <button class="pos-btn">CF</button>
        </div>

        <button class="next-btn">Следваща стъпка →</button>
    </div>

    <script>
        // Логика за избор на позиция
        const buttons = document.querySelectorAll('.pos-btn');
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                button.classList.add('active');
            });
        });
    </script>
</body>
</html>
