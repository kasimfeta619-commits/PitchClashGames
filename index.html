<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Pitch Clash Hub</title>
    <style>
        .screen { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <!-- Екран 1: Създаване на играч -->
    <div id="screen1" class="screen active">
        <h1>Създай своя играч</h1>
        <input type="text" id="playerName" placeholder="Име на играча">
        <button onclick="showScreen('screen2')">Избери Академия</button>
    </div>

    <!-- Екран 2: Академия -->
    <div id="screen2" class="screen">
        <h1>Избери Академия</h1>
        <button onclick="showScreen('screen3')">Академия А</button>
        <button onclick="showScreen('screen3')">Академия Б</button>
    </div>

    <!-- Екран 3: HUB (Целият сайт) -->
    <div id="screen3" class="screen">
        <h1>Твоят Hub</h1>
        <button onclick="window.location.href='login.html'">ИЗХОД</button>
    </div>

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
