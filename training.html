<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Pitch Clash - Тренировка по атрибути</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #0f1016; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; }
        
        /* Топ хедър бар */
        .top-bar { background: #1a1c24; border: 1px solid #2a2e3d; padding: 10px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 13px; }
        .res-item { display: flex; align-items: center; gap: 5px; font-weight: bold; }
        
        /* Заглавие */
        h2 { font-size: 20px; margin: 0 0 5px 0; }
        .subtitle { font-size: 13px; color: #8a8f9d; margin-bottom: 20px; }
        
        /* Статистика блок */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .status-box { background: #1a1c24; border: 1px solid #2a2e3d; padding: 12px; border-radius: 10px; }
        .status-box small { color: #8a8f9d; display: block; margin-bottom: 3px; }
        .status-box span { font-weight: bold; font-size: 14px; }
        
        /* Атрибут карти */
        .attr-card { background: #1a1c24; border: 1px solid #2a2e3d; border-radius: 10px; padding: 12px 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .attr-card:hover { border-color: #3e445b; }
        
        .attr-info { display: flex; align-items: center; gap: 12px; flex-grow: 1; }
        .attr-icon { font-size: 18px; width: 30px; text-align: center; }
        .attr-details { flex-grow: 1; }
        .attr-name { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
        
        /* Прогрес бар на атрибута */
        .progress-bg { background: #2a2e3d; height: 5px; border-radius: 3px; width: 100%; max-width: 120px; overflow: hidden; }
        .progress-fill { background: #00e676; height: 100%; width: 40%; }
        
        .attr-right { display: flex; align-items: center; gap: 15px; }
        .attr-val { font-size: 16px; font-weight: bold; }
        
        .train-btn { background: #1b3a26; border: 1px solid #00e676; color: #00e676; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; text-align: center; min-width: 60px; }
        .train-btn:hover { background: #00e676; color: #000; }
        .train-btn:disabled { background: #222530; border-color: #32384a; color: #666; cursor: not-allowed; }

        /* Навигационен бар долу */
        .nav-bar { display: flex; justify-content: space-around; background: #1a1c24; border: 1px solid #2a2e3d; padding: 10px; border-radius: 10px; margin-top: 25px; }
        .nav-item { color: #8a8f9d; text-decoration: none; font-size: 11px; text-align: center; display: flex; flex-direction: column; gap: 3px; }
        .nav-item.active { color: #00e676; }
        .nav-item span { font-size: 16px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- ТОП БАР С ЕНЕРГИЯ И КЕШ -->
    <div class="top-bar">
        <div class="res-item" style="color: #ff9800;">⚡ <span id="topEnergy">100</span>/100</div>
        <div class="res-item" style="color: #d4a017;">🪙 <span id="topCash">500</span></div>
        <button onclick="location.href='shop.html'" style="background:#2a2e3d; border:none; color:#fff; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:11px;">Магазин</button>
    </div>

    <h2>Тренировка</h2>
    <div class="subtitle">Подобри атрибутите си</div>

    <!-- СТАТИСТИКИ (ЕНЕРГИЯ И ДНЕВНИ ТРЕНИРОВКИ) -->
    <div class="status-grid">
        <div class="status-box">
            <small>Енергия</small>
            <span style="color: #00e676;" id="boxEnergy">100/100</span>
            <div style="font-size: 10px; color: #8a8f9d; margin-top: 2px;">+10 / час</div>
        </div>
        <div class="status-box">
            <small>Днес</small>
            <span id="dailyCount">3</span> / <span style="color: #8a8f9d;">3 тренировки</span>
        </div>
    </div>

    <!-- СПИСЪК С АТРИБУТИ -->
    <div id="attributesList">
        <!-- Генерират се динамично през JS -->
    </div>

    <!-- ДОЛЕН МЕНЮ БАР -->
    <div class="nav-bar">
        <a href="match.html" class="nav-item"><span>⚽</span> Мачове</a>
        <a href="training.html" class="nav-item active"><span>🏋️</span> Трен.</a>
        <a href="index.html" class="nav-item"><span>🏠</span> Хъб</a>
        <a href="shop.html" class="nav-item"><span>🛒</span> Отбор</a>
        <a href="profile.html" class="nav-item"><span>👤</span> Профил</a>
    </div>

</div>

<script>
    // Базови данни за атрибутите
    let attributes = [
        { id: 'atk', name: 'Атака', icon: '⚽', val: 42, cost: 20 },
        { id: 'def', name: 'Защита', icon: '🛡️', val: 42, cost: 20 },
        { id: 'spd', name: 'Скорост', icon: '⚡', val: 42, cost: 15 },
        { id: 'end', name: 'Издръжл.', icon: '💪', val: 42, cost: 25 },
        { id: 'tec', name: 'Техника', icon: '🎯', val: 42, cost: 20 }
    ];

    let energy = parseInt(localStorage.getItem('energy')) || 100;
    let cash = parseInt(localStorage.getItem('cash')) || 500;
    let dailyTrainings = parseInt(localStorage.getItem('dailyTrainings')) || 3;

    function renderAttributes() {
        const container = document.getElementById('attributesList');
        container.innerHTML = '';

        attributes.forEach(attr => {
            // Зареждаме стойността от localStorage ако има такава
            let savedVal = localStorage.getItem('attr_' + attr.id);
            if (savedVal) attr.val = parseInt(savedVal);

            container.innerHTML += `
                <div class="attr-card">
                    <div class="attr-info">
                        <div class="attr-icon">${attr.icon}</div>
                        <div class="attr-details">
                            <div class="attr-name">${attr.name}</div>
                            <div class="progress-bg">
                                <div class="progress-fill" style="width: ${(attr.val % 10) * 10}%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="attr-right">
                        <div class="attr-val">${attr.val}</div>
                        <button class="train-btn" onclick="trainAttr('${attr.id}', ${attr.cost})">⚡ ${attr.cost}<br>Трен.</button>
                    </div>
                </div>
            `;
        });

        document.getElementById('topEnergy').innerText = energy;
        document.getElementById('boxEnergy').innerText = energy + "/100";
        document.getElementById('topCash').innerText = cash;
        document.getElementById('dailyCount').innerText = dailyTrainings;
    }

    function trainAttr(id, cost) {
        if (energy < cost) {
            alert("Нямаш достатъчно енергия за тази тренировка!");
            return;
        }
        if (dailyTrainings <= 0) {
            alert("Изчерпа днешните си тренировки! Върни се утре или вземи бонус.");
            return;
        }

        // Изспадаме ресурси
        energy -= cost;
        dailyTrainings -= 1;

        // Вдигаме конкретния атрибут
        let attrObj = attributes.find(a => a.id === id);
        attrObj.val += 1;

        // Записваме в паметта
        localStorage.setItem('energy', energy);
        localStorage.setItem('dailyTrainings', dailyTrainings);
        localStorage.setItem('attr_' + id, attrObj.val);

        // Автоматично вдигаме и общия OVR леко
        let currentOvr = parseInt(localStorage.getItem('playerOvr')) || 42;
        localStorage.setItem('playerOvr', currentOvr + 1);

        renderAttributes();
        alert(`Успешна тренировка на ${attrObj.name}! Атрибутът се повиши.`);
    }

    // Стартово зареждане
    renderAttributes();
</script>

</body>
</html>
