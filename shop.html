<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Pitch Clash - Магазин</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #0f1016; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; padding-bottom: 70px; }
        
        /* Топ хедър бар с ресурси */
        .top-bar { background: #1a1c24; border: 1px solid #2a2e3d; padding: 10px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 13px; }
        .res-item { display: flex; align-items: center; gap: 5px; font-weight: bold; }

        h2 { font-size: 18px; margin: 0 0 15px 0; display: flex; align-items: center; gap: 8px; }

        /* Артикули в магазина */
        .shop-item { background: #1a1c24; border: 1px solid #2a2e3d; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .item-info strong { font-size: 14px; display: block; margin-bottom: 3px; }
        .item-info small { font-size: 11px; color: #8a8f9d; }

        .buy-btn { background: #d4a017; border: none; color: #000; font-weight: bold; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .buy-btn:hover { background: #b8860b; }

        /* Навигационен бар долу */
        .nav-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; display: flex; justify-content: space-around; background: #1a1c24; border-top: 1px solid #2a2e3d; padding: 10px; z-index: 100; }
        .nav-item { color: #8a8f9d; text-decoration: none; font-size: 11px; text-align: center; display: flex; flex-direction: column; gap: 3px; }
        .nav-item.active { color: #00e676; }
        .nav-item span { font-size: 16px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- ТОП БАР С РЕСУРСИ -->
    <div class="top-bar">
        <div class="res-item" style="color: #ff9800;">⚡ <span id="topEnergy">100</span>/100</div>
        <div class="res-item" style="color: #00bcd4;">💎 <span id="topDiamonds">10</span></div>
        <div class="res-item" style="color: #d4a017;">🪙 <span id="topCash">500</span></div>
    </div>

    <h2>🛒 Магазин</h2>
    
    <div class="shop-item">
        <div class="item-info">
            <strong>Енергийна напитка</strong>
            <small>+50 Енергия</small>
        </div>
        <button class="buy-btn" onclick="buyEnergy()">50 🪙</button>
    </div>

    <div class="shop-item">
        <div class="item-info">
            <strong>Треньорски пакет</strong>
            <small>+2 OVR на играча</small>
        </div>
        <button class="buy-btn" onclick="buyOvrBoost()">200 🪙</button>
    </div>

    <!-- ДОЛЕН НАВИГАЦИОНЕН БАР -->
    <div class="nav-bar">
        <a href="matches.html" class="nav-item"><span>⚽</span> Мачове</a>
        <a href="training.html" class="nav-item"><span>🏋️</span> Трен.</a>
        <a href="index.html" class="nav-item"><span>🏠</span> Хъб</a>
        <a href="team.html" class="nav-item"><span>👥</span> Отбор</a>
        <a href="profile.html" class="nav-item"><span>👤</span> Профил</a>
    </div>

</div>

<script>
    // Зареждане на данни
    let energy = parseInt(localStorage.getItem('energy')) || 100;
    let diamonds = parseInt(localStorage.getItem('diamonds')) || 10;
    let cash = parseInt(localStorage.getItem('cash')) || 500;
    let ovr = parseInt(localStorage.getItem('playerOvr')) || 42;

    updateUI();

    function updateUI() {
        document.getElementById('topEnergy').innerText = energy;
        document.getElementById('topDiamonds').innerText = diamonds;
        document.getElementById('topCash').innerText = cash;
    }

    function buyEnergy() {
        if (cash < 50) {
            alert("Нямаш достатъчно кеш (монети)!");
            return;
        }
        cash -= 50;
        energy = Math.min(100, energy + 50); // Максимум 100 енергия

        localStorage.setItem('cash', cash);
        localStorage.setItem('energy', energy);
        updateUI();
        
        alert("Успешно купена Енергийна напитка (+50 Енергия)!");
    }

    function buyOvrBoost() {
        if (cash < 200) {
            alert("Нямаш достатъчно кеш (монети)!");
            return;
        }
        cash -= 200;
        ovr += 2;

        localStorage.setItem('cash', cash);
        localStorage.setItem('playerOvr', ovr);
        updateUI();
        
        alert("Успешно купен Треньорски пакет (+2 OVR)!");
    }
</script>

</body>
</html>
